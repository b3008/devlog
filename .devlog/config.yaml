# devlog configuration
# Customize the blog convention for this project.

blog_dir: blog
media_dir: blog/media
file_pattern: "YYYY-MM-DD-slug.md"
index_file: "_index.md"

# Sections to include in each blog entry
sections:
  - name: "What changed"
    description: "concrete description of what was built/fixed"
  - name: "Why it matters"
    description: "significance for the project, users, or architecture"
  - name: "How it works"
    description: "brief technical explanation (portfolio audience: technical but not necessarily familiar with the codebase)"
  - name: "What's next"
    description: "open threads or future directions"

# Voice and audience guidelines
voice:
  - "Portfolio-oriented: write for someone evaluating the work (potential collaborators, employers, researchers, or AI agents picking up the project later)"
  - "Narrative, not changelog: explain the *why* and *so what*, not just the *what*"
  - "Concrete over abstract: reference specific files, show output examples, describe real problems solved"
  - "Honest about tradeoffs: mention what didn't work, what was scrappy, what's still rough"

# When should the agent write a blog entry
triggers:
  - "New feature or command implemented"
  - "Significant bug fix or refactor"
  - "Architecture or scope decision reached (even if no code changed yet)"
  - "Notable technical challenge solved"
  - "Template or workflow changes"

# Available tags for blog entries
tags:
  - architecture
  - cli
  - feature
  - bug-fix
  - refactor
  - testing
  - documentation
  - infrastructure
  - ux
  - demo

# Frontmatter fields for blog entries
frontmatter:
  - field: title
    example: '"Short descriptive title"'
  - field: date
    example: YYYY-MM-DD
  - field: tags
    example: "[relevant, tags, from-list-below]"
  - field: summary
    example: '"One-sentence summary of what was accomplished and why it matters."'

# Media/screenshot configuration
media:
  enabled: true
  instructions:
    - "Take screenshots of CLI output, generated files, or workflow artifacts"
    - "Save media to `{media_dir}/YYYY-MM-DD-slug/` (matching the entry filename)"
    - "Reference in markdown as `![Alt text](media/YYYY-MM-DD-slug/filename.png)`"
    - "If screenshots aren't feasible, add a `<!-- TODO: screenshot -->` placeholder"
